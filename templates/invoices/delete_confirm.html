{% extends 'base.html' %}

{% block title %}Delete Invoice{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body text-center">
                <h4>Delete Invoice</h4>
                <p class="text-muted">Are you sure you want to delete this invoice?</p>
                <p><strong>{{ invoice.supplier_name|default:"Unknown Supplier" }}</strong></p>
                <form method="POST">
                    {% csrf_token %}
                    <a href="{% url 'invoice_list' %}" class="btn btn-secondary me-2">Cancel</a>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
